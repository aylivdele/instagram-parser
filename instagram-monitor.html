<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Trend Monitor</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 16px;
            padding-bottom: 80px;
        }

        .header {
            margin-bottom: 24px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--tg-theme-hint-color, #999);
            font-size: 14px;
        }

        .add-section {
            background: var(--tg-theme-section-bg-color, #f5f5f5);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .input-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--tg-theme-text-color, #000);
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--tg-theme-hint-color, #ddd);
            border-radius: 8px;
            font-size: 15px;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
        }

        input:focus {
            outline: none;
            border-color: var(--tg-theme-button-color, #0088cc);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-primary {
            background: var(--tg-theme-button-color, #0088cc);
            color: var(--tg-theme-button-text-color, #ffffff);
        }

        .btn:active {
            opacity: 0.8;
        }

        .competitors-list {
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .competitor-card {
            background: var(--tg-theme-section-bg-color, #f5f5f5);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .competitor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .competitor-name {
            font-size: 16px;
            font-weight: 500;
            color: var(--tg-theme-link-color, #0088cc);
        }

        .btn-remove {
            padding: 6px 12px;
            background: #ff3b30;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            font-size: 13px;
        }

        .stat-item {
            color: var(--tg-theme-hint-color, #999);
        }

        .stat-value {
            color: var(--tg-theme-text-color, #000);
            font-weight: 500;
        }

        .alerts-section {
            margin-bottom: 24px;
        }

        .alert-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .alert-header {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }

        .alert-icon {
            font-size: 24px;
            margin-right: 8px;
        }

        .alert-title {
            font-weight: 600;
            font-size: 15px;
        }

        .alert-subtitle {
            font-size: 13px;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .alert-stats {
            display: flex;
            gap: 16px;
            margin-bottom: 12px;
            font-size: 13px;
        }

        .alert-link {
            display: inline-block;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: white;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--tg-theme-hint-color, #999);
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .monitoring-status {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--tg-theme-bg-color, #fff);
            border-top: 1px solid var(--tg-theme-hint-color, #ddd);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #34c759;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .last-check {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #999);
        }

        /* ═══════════════════════════════════════════════════════
           Модальные окна для обычного браузера
           ═══════════════════════════════════════════════════════ */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 12px;
            padding: 20px;
            max-width: 90%;
            width: 400px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .modal-message {
            font-size: 15px;
            color: #666;
            margin-bottom: 20px;
        }

        .modal-buttons {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .modal-btn-primary {
            background: #0088cc;
            color: white;
        }

        .modal-btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
/* Папки */
.folders-section {
    margin-bottom: 16px;
}

.folder-item {
    background: var(--tg-theme-section-bg-color, #f5f5f5);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: opacity 0.2s;
}

.folder-item:active {
    opacity: 0.7;
}

.folder-item.active {
    background: var(--tg-theme-button-color, #0088cc);
    color: white;
}

.folder-icon {
    font-size: 20px;
}

.folder-name {
    flex: 1;
    font-weight: 500;
}

.folder-count {
    font-size: 12px;
    opacity: 0.7;
}

.btn-icon {
    padding: 6px;
    background: rgba(0,0,0,0.1);
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
}

.add-folder-btn {
    width: 100%;
    padding: 12px;
    background: transparent;
    border: 2px dashed var(--tg-theme-hint-color, #ddd);
    border-radius: 12px;
    color: var(--tg-theme-hint-color, #999);
    cursor: pointer;
    font-size: 14px;
}

.folder-badge{
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 11px;
    margin-left: 8px;
}

.alert-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 11px;
    margin-left: 8px;
    background-color: rgba(255, 127, 80, 0.348);
    color: #f0f0f0;
}
.pagination {
    width: 100%;
    margin-top: 20px;
    margin-bottom: 20px;
    display: flex;
    gap: 10px;
    align-items: center;
    justify-content: space-around;
}

.pagination button {
    padding: 6px 12px;
    cursor: pointer;
    background: transparent;
    border: 2px dashed var(--tg-theme-hint-color, #ddd);
    border-radius: 12px;
    color: var(--tg-theme-hint-color, #999);
    font-size: 14px;
}

.pagination button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.page-number {
    padding: 6px 10px;
    cursor: pointer;
}

.page-number.active {
    font-weight: bold;
    text-decoration: underline;
}
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 Instagram Monitor</h1>
        <div class="subtitle">Отслеживайте вирусный контент конкурентов</div>
    </div>

    <div class="add-section">
        <div class="input-group">
            <label>Username or Link Instagram</label>
            <input type="text" id="usernameInput" placeholder="например: natgeo или https://www.instagram.com/natgeo" onkeypress="handleEnter(event)">
        </div>
        <button class="btn btn-primary" onclick="addCompetitor()">
            ➕ Добавить конкурента
        </button>
    </div>

    <div class="alerts-section" id="alertsSection">
        <h2 class="section-title">🔥 Вирусный контент</h2>
        <div class="pagination" id="pagination">
            <button id="prevPageBtn">←</button>

            <div id="pageNumbers"></div>

            <button id="nextPageBtn">→</button>
        </div>
        <div id="alertsList"></div>
    </div>
    <div class="folders-section">
        <h2 class="section-title">📁 Папки</h2>
        <div id="foldersList"></div>
        <div class="add-section">
            <div class="input-group">
                <label>Создание папки</label>
                <input type="text" id="folder-name" class="add-folder-input" placeholder="Название папки" />
            </div>
            <button class="add-folder-btn" onclick="
                const name = document.getElementById('folder-name').value
                if (name && name.trim()) {
                    createFolder(name.trim());
                }
                ">
                ➕ Создать папку
            </button>
            
        </div>
    </div>

    <div class="competitors-list">
        <h2 class="section-title">👥 Отслеживаемые аккаунты</h2>
        <div id="competitorsList"></div>
    </div>

    <div class="monitoring-status">
        <div class="status-indicator">
            <div class="status-dot"></div>
            <span>Мониторинг активен</span>
        </div>
        <div class="last-check" id="lastCheck">Проверка: только что</div>
    </div>

    <!-- Модальное окно для обычного браузера -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-message" id="modalMessage"></div>
            <div class="modal-buttons" id="modalButtons"></div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════════
        // Определение окружения: Telegram Mini App или обычный браузер
        // ═══════════════════════════════════════════════════════════════
        const isTelegramMiniApp = window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData;
        
        let tg;
        if (isTelegramMiniApp) {
            tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
        }

        let folders = [];
        let selectedFolderId = null;

        // ═══════════════════════════════════════════════════════════════
        // Универсальные обёртки для уведомлений
        // ═══════════════════════════════════════════════════════════════
        function showAlert(message) {
            if (isTelegramMiniApp) {
                tg.showAlert(message);
            } else {
                showBrowserModal('Внимание', message, [
                    { text: 'OK', primary: true, callback: closeModal }
                ]);
            }
        }

        function showPopup(title, message) {
            if (isTelegramMiniApp) {
                tg.showPopup({ title, message });
            } else {
                showBrowserModal(title, message, [
                    { text: 'OK', primary: true, callback: closeModal }
                ]);
            }
        }

        function showConfirm(message, callback) {
            if (isTelegramMiniApp) {
                tg.showConfirm(message, callback);
            } else {
                showBrowserModal('Подтвердите действие', message, [
                    { text: 'Отмена', primary: false, callback: () => { closeModal(); callback(false); } },
                    { text: 'Удалить', primary: true, callback: () => { closeModal(); callback(true); } }
                ]);
            }
        }

        // ═══════════════════════════════════════════════════════════════
        // Модальное окно для обычного браузера
        // ═══════════════════════════════════════════════════════════════
        function showBrowserModal(title, message, buttons) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalMessage').textContent = message;
            
            const buttonsContainer = document.getElementById('modalButtons');

            buttonsContainer.innerHTML = '';
            
            buttons.forEach(btn => {
                const button = document.createElement('button')
                button.onclick = (event) => {event.stopPropagation(); btn.callback()};
                button.textContent = btn.text;
                button.className = `modal-btn ${btn.primary ? 'modal-btn-primary' : 'modal-btn-secondary'}`;
                buttonsContainer.appendChild(button);
            });
            
            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeModal(event) {
            if (!event || event.target.id === 'modalOverlay') {
                document.getElementById('modalOverlay').classList.remove('active');
            }
        }

        // ═══════════════════════════════════════════════════════════════
        // Конфигурация API и идентификация пользователя
        // ═══════════════════════════════════════════════════════════════
        const API_URL = window.location.origin + '/api';
        
        // Получение user_id
        let USER_ID = null;
        
        if (isTelegramMiniApp && tg.initDataUnsafe && tg.initDataUnsafe.user) {
            // В Telegram Mini App берём ID из Telegram
            USER_ID = `telegram_${tg.initDataUnsafe.user.id}`;
            console.log('User ID из Telegram:', USER_ID);
        } else {
            // В обычном браузере используем localStorage или просим ввести
            USER_ID = localStorage.getItem('instagram_monitor_user_id');
            if (!USER_ID) {
                // Генерируем случайный ID для тестов
                USER_ID = `browser_${Math.random().toString(36).substr(2, 9)}`;
                localStorage.setItem('instagram_monitor_user_id', USER_ID);
            }
            console.log('User ID (браузер):', USER_ID);
        }

        // ═══════════════════════════════════════════════════════════════
        // Данные
        // ═══════════════════════════════════════════════════════════════
        let competitors = [];
        let alerts = [];
        let currentPage = 1;
        const pageSize = 10;
        let totalPages = 1;

        // ═══════════════════════════════════════════════════════════════
        // API запросы
        // ═══════════════════════════════════════════════════════════════
        async function fetchCompetitors() {
            try {
                const response = await fetch(`${API_URL}/competitors`, {
                    headers: { 'X-User-Id': USER_ID }
                });
                const data = await response.json();
                
                if (data.success) {
                    competitors = data.data;
                    renderCompetitors();
                }
            } catch (error) {
                console.error('Ошибка загрузки конкурентов:', error);
                showAlert('Ошибка загрузки конкурентов');
            }
        }

        async function fetchAlerts(page) {
            try {
                let folderSuffix = ''
                if (selectedFolderId !== null && selectedFolderId !== undefined) {
                    folderSuffix = `&folder_id=${selectedFolderId}`
                }
                const response = await fetch(`${API_URL}/alerts?page=${page}&page_size=${pageSize}${folderSuffix}`, {
                    headers: { 'X-User-Id': USER_ID }
                });
                const data = await response.json();
                
                if (data.success) {
                    alerts = data.data;
                    currentPage = data.pagination.page;
                    totalPages = data.pagination.pages;
                    renderAlerts();
                }
            } catch (error) {
                console.error('Ошибка загрузки алертов:', error);
            }
        }

        async function addCompetitor() {
            let username = document.getElementById('usernameInput').value.trim();
            
            if (!username) {
                showAlert('Введите username');
                return;
            }

            const linkPrefix = 'https://www.instagram.com/';

            if (username.startsWith(linkPrefix)) {
                let paramIndex = username.indexOf('?', linkPrefix.length)
                let slashIndex = username.indexOf('/', linkPrefix.length)
                let endIndex = username.length
                if (paramIndex !== -1) {
                    endIndex = paramIndex
                }
                if (slashIndex !== -1) {
                    endIndex = Math.min(endIndex, slashIndex)
                }

                username = username.substring(linkPrefix.length, endIndex)
            }
            if (username.startsWith('@')) {
                username = username.substring(1)
            }

            try {
                const response = await fetch(`${API_URL}/competitors`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-User-Id': USER_ID
                    },
                    body: JSON.stringify({ 
                        username,
                        folder_id: selectedFolderId
                    })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('usernameInput').value = '';
                    await fetchCompetitors();
                    showPopup('✅ Успешно', `Аккаунт @${username} добавлен в мониторинг`);
                } else {
                    showAlert(data.error || 'Ошибка добавления');
                }
            } catch (error) {
                console.error('Ошибка:', error);
                showAlert('Ошибка подключения к серверу');
            }
        }

        async function removeCompetitor(username) {
            showConfirm(`Удалить @${username} из мониторинга?`, async (confirmed) => {
                if (confirmed) {
                    try {
                        const response = await fetch(`${API_URL}/competitors/${username}`, {
                            method: 'DELETE',
                            headers: { 'X-User-Id': USER_ID }
                        });
                        
                        const data = await response.json();
                        
                        if (data.success) {
                            await fetchCompetitors();
                        } else {
                            showAlert(data.error || 'Ошибка удаления');
                        }
                    } catch (error) {
                        console.error('Ошибка удаления:', error);
                        showAlert('Ошибка подключения');
                    }
                }
            });
        }

        async function fetchFolders() {
            try {
                const response = await fetch(`${API_URL}/folders`, {
                    headers: { 'X-User-Id': USER_ID }
                });
                const data = await response.json();
                if (data.success) {
                    folders = data.data;
                    renderFolders();
                }
            } catch (error) {
                console.error('Ошибка загрузки папок:', error);
            }
        }

        async function createFolder(name, color = '#0088cc', icon = '📁') {
            try {
                const response = await fetch(`${API_URL}/folders`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-User-Id': USER_ID
                    },
                    body: JSON.stringify({ name, color, icon })
                });
                const data = await response.json();
                if (data.success) {
                    await fetchFolders();
                    return data.data.id;
                } else {
                    showAlert(data.error || 'Ошибка создания папки');
                }
            } catch (error) {
                console.error('Ошибка:', error);
                showAlert('Ошибка подключения к серверу');
            }
        }

        async function deleteFolder(folderId, folderName) {
            showConfirm(`Удалить папку "${folderName}"?`, async (confirmed) => {
                if (confirmed) {
                    try {
                        const response = await fetch(`${API_URL}/folders/${folderId}`, {
                            method: 'DELETE',
                            headers: { 'X-User-Id': USER_ID }
                        });
                        if (response.ok) {
                            if (selectedFolderId === folderId) {
                                selectedFolderId = null;
                                currentPage = 1;
                            }
                            await fetchFolders();
                            await fetchCompetitors();
                            await fetchAlerts();
                        }
                    } catch (error) {
                        console.error('Ошибка удаления папки:', error);
                    }
                }
            });
        }

        // ═══════════════════════════════════════════════════════════════
        // Рендеринг UI
        // ═══════════════════════════════════════════════════════════════

        

        function renderFolders() {
            const list = document.getElementById('foldersList');
            
            if (folders.length === 0) {
                list.innerHTML = '';
                return;
            }

            list.innerHTML = folders.map(f => `
                <div class="folder-item ${selectedFolderId === f.id ? 'active' : ''}" 
                    onclick="selectFolder(${f.id})">
                    <div class="folder-icon">${f.icon}</div>
                    <div class="folder-name">${f.name}</div>
                    <div class="folder-count">${f.count}</div>
                    <button class="btn-icon" onclick="event.stopPropagation(); deleteFolder(${f.id}, '${f.name}')">🗑️</button>
                </div>
            `).join('');
        }

        async function selectFolder(folderId) {
            selectedFolderId = selectedFolderId === folderId ? null : folderId;
            renderFolders();
            renderCompetitors();
            await fetchAlerts(1);
            renderAlerts();
        }
        
        function renderCompetitors() {
            const list = document.getElementById('competitorsList');
            
            // Фильтруем по выбранной папке
            let filteredCompetitors = competitors;
            if (selectedFolderId !== null) {
                filteredCompetitors = competitors.filter(c => c.folderId === selectedFolderId);
            }
            
            if (filteredCompetitors.length === 0) {
                const message = selectedFolderId !== null 
                    ? 'В этой папке пока нет конкурентов'
                    : 'Добавьте первого конкурента';
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <div>${message}</div>
                    </div>
                `;
                return;
            }

            list.innerHTML = filteredCompetitors.map(c => {
                // Показываем badge папки только когда отображаем всех
                const folder = folders.find(f => f.id === c.folderId);
                const folderBadge = folder && selectedFolderId === null
                    ? `<span class="folder-badge" style="background: ${folder.color}20; color: ${folder.color}">${folder.name}</span>`
                    : '';
                    
                return `
                    <div class="competitor-card">
                        <div class="competitor-header">
                            <div class="competitor-name">@${c.username}${folderBadge}</div>
                            <button class="btn-remove" onclick="removeCompetitor('${c.username}')">
                                Удалить
                            </button>
                        </div>
                        <div class="stats">
                            <div class="stat-item">
                                Ср. пр. рилсов: <span class="stat-value">${formatNumber(c.avgReelsViews)}</span>
                            </div>
                            <div class="stat-item">
                                Ср. пр. рилсов(24ч): <span class="stat-value">${formatNumber(c.avgReelsViewsAllTime)}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderPagination() {
            const pageNumbers = document.getElementById("pageNumbers");
            pageNumbers.innerHTML = "";

            // Previous button
            document.getElementById("prevPageBtn").disabled = currentPage === 1;
            document.getElementById("nextPageBtn").disabled = currentPage === totalPages;

            // Показываем максимум 5 страниц вокруг текущей
            const maxVisible = 5;
            let start = Math.max(1, currentPage - 2);
            let end = Math.min(totalPages, start + maxVisible - 1);

            if (end - start < maxVisible - 1) {
                start = Math.max(1, end - maxVisible + 1);
            }

            for (let i = start; i <= end; i++) {
                const span = document.createElement("span");
                span.className = "page-number";
                span.textContent = i;

                if (i === currentPage) {
                    span.classList.add("active");
                } else {
                    span.addEventListener("click", () => fetchAlerts(i));
                }

                pageNumbers.appendChild(span);
            }
        }

        // Кнопки
        document.getElementById("prevPageBtn").addEventListener("click", () => {
            if (currentPage > 1) {
                fetchAlerts(currentPage - 1);
            }
        });

        document.getElementById("nextPageBtn").addEventListener("click", () => {
            if (currentPage < totalPages) {
                fetchAlerts(currentPage + 1);
            }
        });

        function renderAlerts() {
            const list = document.getElementById('alertsList');
            
            const emptyContent = `
                    <div class="empty-state">
                        <div class="empty-icon">🎯</div>
                        <div>Пока нет вирусного контента</div>
                    </div>
                `
            if (alerts.length === 0) {
                list.innerHTML = emptyContent;
                renderPagination();
                return;
            }

            list.innerHTML = alerts.map(alert => {
                
                if (selectedFolderId && alert.folderId !== selectedFolderId) {
                    return ''
                }
                // Показываем badge папки только когда отображаем всех
                const folder = folders.find(f => f.id === alert.folderId);
                const folderBadge = folder && selectedFolderId === null
                    ? `<span class="alert-badge">${folder.name}</span>`
                    : '';
                return (`
                <div class="alert-card">
                    <div class="alert-header">
                        <div class="alert-icon">🚀</div>
                        <div class="alert-title">@${alert.username}${folderBadge}</div>
                    </div>
                    <div class="alert-subtitle">
                        Рост: +${Math.round(alert.growth)}% от обычного
                    </div>
                    <div class="alert-stats">
                        <div>📊 ${formatNumber(alert.currentViews)} просмотров</div>
                        <div>⏱️ ${getTimeAgo(alert.timestamp)}</div>
                    </div>
                    <a href="${alert.postUrl}" class="alert-link" target="_blank">
                        Открыть пост →
                    </a>
                </div>
            `)}).join('') || emptyContent;
            renderPagination();
        }

        // ═══════════════════════════════════════════════════════════════
        // Утилиты
        // ═══════════════════════════════════════════════════════════════
        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toFixed(1);
        }

        function getTimeAgo(timestamp) {
            const minutes = Math.floor((Date.now() - new Date(timestamp)) / 60000);
            if (minutes < 60) return `${minutes} мин назад`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours} ч назад`;
            return `${Math.floor(hours / 24)} д назад`;
        }

        function updateLastCheck() {
            const now = new Date();
            document.getElementById('lastCheck').textContent = 
                `Проверка: ${now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' })}`;
        }

        function handleEnter(event) {
            if (event.key === 'Enter') {
                addCompetitor();
            }
        }

        // ═══════════════════════════════════════════════════════════════
        // Периодическое обновление
        // ═══════════════════════════════════════════════════════════════
        setInterval(() => {
            fetchCompetitors();
            fetchAlerts(currentPage);
            updateLastCheck();
        }, 60000);  // Каждую минуту

        // ═══════════════════════════════════════════════════════════════
        // Инициализация
        // ═══════════════════════════════════════════════════════════════
        async function registerUser() {
            // Регистрируем/обновляем пользователя при первом запуске
            const telegramChatId = isTelegramMiniApp && tg.initDataUnsafe && tg.initDataUnsafe.user 
                ? tg.initDataUnsafe.user.id.toString()
                : null;
            
            try {
                await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-User-Id': USER_ID
                    },
                    body: JSON.stringify({
                        user_id: USER_ID,
                        telegram_chat_id: telegramChatId
                    })
                });
            } catch (error) {
                console.error('Ошибка регистрации пользователя:', error);
            }
        }
        
        async function init() {
            await registerUser();
            await fetchFolders();
            await fetchCompetitors();
            await fetchAlerts(currentPage);
            updateLastCheck();
        }
        
        init();

        // Telegram Mini App: обработка кнопки "Назад"
        if (isTelegramMiniApp) {
            tg.BackButton.onClick(() => {
                tg.close();
            });
        }

        console.log('Instagram Monitor загружен в режиме:', isTelegramMiniApp ? 'Telegram Mini App' : 'Обычный браузер');
    </script>
</body>
</html>
